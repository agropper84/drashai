<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background: warm oxblood circle -->
  <circle cx="16" cy="16" r="15" fill="#7a2e2a"/>
  <circle cx="16" cy="16" r="14" fill="none" stroke="#a87a2c" stroke-width="0.5" opacity="0.4"/>
  <!-- Yad (Torah pointer) — elegant stylized -->
  <!-- Handle -->
  <line x1="10" y1="24" x2="18" y2="8" stroke="#f0e7d2" stroke-width="2" stroke-linecap="round"/>
  <!-- Decorative rings on handle -->
  <ellipse cx="12.4" cy="19.2" rx="1.8" ry="0.8" fill="none" stroke="#d9b46a" stroke-width="0.6" transform="rotate(-55 12.4 19.2)"/>
  <ellipse cx="14" cy="16" rx="1.8" ry="0.8" fill="none" stroke="#d9b46a" stroke-width="0.6" transform="rotate(-55 14 16)"/>
  <!-- Pointing finger -->
  <line x1="18" y1="8" x2="22" y2="5.5" stroke="#f0e7d2" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="22.5" cy="5" r="1" fill="#f0e7d2"/>
  <!-- Finial (top of handle) -->
  <circle cx="9.5" cy="25" r="1.6" fill="#d9b46a" opacity="0.8"/>
</svg>
